services:
  obsidian-mcp:
    build: .
    container_name: obsidian-mcp
    restart: unless-stopped
    ports:
      - "8008:8000"
    volumes:
      - ${HOST_VAULT_PATH:-./vault}:/vault
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
