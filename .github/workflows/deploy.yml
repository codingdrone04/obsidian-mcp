name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd ~/apps/obsidian-mcp
          git pull origin main

      - name: Rebuild and restart Docker
        run: |
          cd ~/apps/obsidian-mcp
          docker compose up -d --build
          docker image prune -f
